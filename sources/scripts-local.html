{% include_relative scripts-listeners.html %}

<script>

let SELECTED_SOURCE = null;
let SOURCE_CURRENT_WORKS = [];
let SOURCE_SORT = { column: null, dir: 1 };


//////////////////////////////
//
// buildSourceCards -- Render one card per source from SOURCES_METADATA.
//

function buildSourceCards() {
    const container = document.getElementById("sources-cards");
    if (!container) return;

    container.innerHTML = "";

    for (let i = 0; i < SOURCES_METADATA.length; i++) {
        const src    = SOURCES_METADATA[i];
        const prefix = (src["!!!id"]  || "").substring(0, 2); // e.g. "BC" from "BC100"
        const title  = src["!!!PTL"]  || prefix;              // !!!PTL  = publication title
        const pub    = src["!!!PDT"]  || "";                  // !!!PDT  = publication date
        const editor = formatEditor(src["!!!PED"] || "");     // !!!PED  = publication editor
        const count  = METADATA.filter(function(e) {
            return (e["!!!id"] || "").substring(0, 2) === prefix;
        }).length;

        const card = document.createElement("div");
        card.className = "source-card";
        card.dataset.name = prefix;
        card.onclick = function() { selectSource(prefix); };

        const metaParts = [];
        if (editor)  metaParts.push("<b>" + t('src.editor') + ":</b> " + editor);
        if (pub)     metaParts.push("<b>" + t('src.published') + ":</b> " + pub);
        if (count)   metaParts.push("<b>" + t('src.works') + ":</b> " + count);

        card.innerHTML =
            "<div class=\"source-card-title\">" + title + "</div>" +
            "<div class=\"source-card-meta\">" + metaParts.join(" &ensp;·&ensp; ") + "</div>";

        container.appendChild(card);
    }
}


//////////////////////////////
//
// selectSource -- Show works for a given source Name (e.g. "BC").
//

function selectSource(prefix) {
    SELECTED_SOURCE = prefix;

    // Highlight active card
    document.querySelectorAll(".source-card").forEach(function(c) {
        c.classList.toggle("active", c.dataset.name === prefix);
    });

    const src    = SOURCES_LOOKUP[prefix];
    const title  = src ? (src["!!!PTL"] || prefix) : prefix; // !!!PTL = publication title
    const works  = METADATA.filter(function(e) {
        return (e["!!!id"] || "").substring(0, 2) === prefix;
    });

    // Update URL without reload
    const url = window.location.pathname + "?s=" + encodeURIComponent(prefix);
    window.history.pushState(null, null, url);

    // Header
    const header = document.getElementById("source-works-header");
    if (header) {
        header.innerHTML = "<h5 class=\"source-works-title\">" + title + "</h5>";
    }

    // Clear search
    const input = document.getElementById("source-input");
    if (input) input.value = "";

    // Render table
    renderWorksTable(works);

    // Show panel
    const panel = document.getElementById("source-works-panel");
    if (panel) panel.classList.remove("source-works-hidden");
}


//////////////////////////////
//
// renderWorksTable -- Build the works table for the selected source.
//

function renderWorksTable(works) {
    SOURCE_CURRENT_WORKS = works;

    const container = document.getElementById("source-works-list");
    if (!container) return;

    const cols = [
        { key: "composer", label: t('src.col_composer') },
        { key: "title",    label: t('src.col_title') },
        { key: "pages",    label: t('src.col_pages') },
        { key: "origin",   label: t('src.col_origin') },
    ];

    let html = "<table class=\"general source-table\">\n<thead><tr>";
    for (let c = 0; c < cols.length; c++) {
        let arrow = SOURCE_SORT.column === cols[c].key
            ? (SOURCE_SORT.dir === 1 ? " &#9650;" : " &#9660;")
            : "";
        html += "<th class=\"sortable\" onclick=\"sortSourceBy('" + cols[c].key + "')\">" + cols[c].label + arrow + "</th>";
    }
    html += "</tr></thead>\n<tbody>\n";

    for (let i = 0; i < works.length; i++) {
        const e      = works[i];
        const title  = getWorkTitle(e);
        const comp   = e["!!!COM"] || "";
        const pages  = e["!!!page"]  || "";
        const origin = e["!!!ARE"] || e["Origin"] || "";
        const url    = "/work/?id=" + (e["!!!id"] || "");
        const search = [comp, title, pages, origin, e["!!!id"] || ""]
            .join(" ").toLowerCase()
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "");

        html += "<tr data-search=\"" + search.replace(/"/g, "&quot;") + "\">\n";
        html += "<td>" + comp + "</td>\n";
        html += "<td><a href=\"" + url + "\">" + title + "</a></td>\n";
        html += "<td>" + pages + "</td>\n";
        html += "<td>" + origin + "</td>\n";
        html += "</tr>\n";
    }

    html += "</tbody></table>\n";
    container.innerHTML = html;
    displaySourceCount(works.length);
}


//////////////////////////////
//
// sortSourceBy -- Sort the source works table by a column.
//

function sortSourceBy(column) {
    if (SOURCE_SORT.column === column) {
        SOURCE_SORT.dir *= -1;
    } else {
        SOURCE_SORT.column = column;
        SOURCE_SORT.dir = 1;
    }

    const sorted = SOURCE_CURRENT_WORKS.slice().sort(function(a, b) {
        let av = "", bv = "";
        if (column === "composer") {
            av = a["!!!COM"] || "";
            bv = b["!!!COM"] || "";
        } else if (column === "title") {
            av = getWorkTitle(a);
            bv = getWorkTitle(b);
        } else if (column === "pages") {
            const am = (a["!!!page"] || "").match(/\d+/);
            const bm = (b["!!!page"] || "").match(/\d+/);
            return ((am ? parseInt(am[0]) : Infinity) - (bm ? parseInt(bm[0]) : Infinity)) * SOURCE_SORT.dir;
        } else if (column === "origin") {
            av = a["!!!ARE"] || a["Origin"] || "";
            bv = b["!!!ARE"] || b["Origin"] || "";
        }
        return av.localeCompare(bv) * SOURCE_SORT.dir;
    });

    renderWorksTable(sorted);

    const input = document.getElementById("source-input");
    if (input && input.value) sourceSearch(input.value);
}


//////////////////////////////
//
// sourceSearch -- Free-text filter over the works table.
//

function sourceSearch(query) {
    const input = document.getElementById("source-input");
    if (query !== undefined) {
        if (input) input.value = query;
    } else {
        query = input ? input.value : "";
    }

    const rows = document.querySelectorAll("#source-works-list tbody tr");
    const normalize = function(s) {
        return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    };
    const tokens = normalize(query).split(/\s+/).filter(Boolean);

    let count = 0;
    for (let i = 0; i < rows.length; i++) {
        const haystack = normalize(rows[i].dataset.search || "");
        const match = tokens.every(function(t) { return haystack.includes(t); });
        rows[i].style.display = match ? "" : "none";
        if (match) count++;
    }

    displaySourceCount(tokens.length ? count : rows.length);
}


//////////////////////////////
//
// displaySourceCount --
//

function displaySourceCount(count) {
    const el = document.getElementById("source-count");
    if (el) el.innerHTML = "[" + count + " " + (count === 1 ? t('src.result') : t('src.results')) + "]";
}


//////////////////////////////
//
// getWorkTitle -- Resolve title from either field name variant.
//

function getWorkTitle(entry) {
    const title    = entry["!!!OTL@@FR"] || ""; // !!!OTL@@FR = object title (French)
    const subtitle = entry["!!!OTL-sub"] || ""; // !!!OTL-sub = subtitle
    if (subtitle) return title ? title + ", <i>" + subtitle + "</i>" : subtitle;
    return title;
}


//////////////////////////////
//
// formatEditor -- Reformat "Last, First" → "First Last".
//

function formatEditor(raw) {
    const m = raw.match(/^(.*?)\s*,\s*(.*?)$/);
    if (m) return m[2].trim() + " " + m[1].trim();
    return raw;
}

</script>
