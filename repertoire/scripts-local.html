//
// buildSearchInterface --
//

function buildSearchInterface(data) {
  const Dropdowns = document.querySelector("#dropdowns");
  if (!Dropdowns) return;

  document.getElementById("composer-container").innerHTML = "";
  document.getElementById("lyricist-container").innerHTML = "";
  document.getElementById("origin-container").innerHTML = "";
  document.getElementById("collection-container").innerHTML = "";
  document.getElementById("editor-container").innerHTML = "";

  document.getElementById("composer-container").appendChild(createElementFromHTML(buildComposerSelect(data)));
  document.getElementById("lyricist-container").appendChild(createElementFromHTML(buildLyricistSelect(data)));
  document.getElementById("origin-container").appendChild(createElementFromHTML(buildOriginSelect(data)));
  document.getElementById("collection-container").appendChild(createElementFromHTML(buildCollectionSelect(data)));
  document.getElementById("editor-container").appendChild(createElementFromHTML(buildEditorSelect(data)));

  const label = document.createElement("label");
  label.className = "text-checkbox-label";

  const checkbox = document.createElement("input");
  checkbox.type = "checkbox";
  checkbox.id = "variants-checkbox";
  checkbox.onchange = doSearch;

  label.appendChild(checkbox);
  label.appendChild(document.createTextNode(t('rep.show_variants')));

  const textedContainer = document.getElementById("texted-container");
  if (textedContainer) {
    const wrapper = document.createElement("div");
    wrapper.className = "text-checkbox-wrapper";
    wrapper.appendChild(label);
    textedContainer.appendChild(wrapper);
  }
}


//////////////////////////////
//
// displayBrowseTable --
//

let CURRENT_DATA = [];
let SORT_STATE = { column: null, dir: 1 };

function displayBrowseTable(data, selector) {
	if (!selector) {
		selector = "#list";
	}
	let element = document.querySelector(selector);
	if (!element) {
		console.error(`Error: cannot find ${selector} element to display work table`);
		return;
	}
	CURRENT_DATA = data;
	SORT_STATE = { column: null, dir: 1 };
	let headings = [INDEX_id, INDEX_title, INDEX_composer, INDEX_pages, INDEX_origin, INDEX_collection, INDEX_editor];
	let contents = "";
	contents += "<table class='general'>\n";
	contents += "<thead>\n";
	contents += makeTableHeader(headings);
	contents += "</thead>\n";
	contents += "<tbody>\n";
	contents += makeTableBody(headings, data);
	contents += "</tbody>\n";
	contents += "</table>\n";
	element.innerHTML = contents;
}


//////////////////////////////
//
// sortBy -- Sort the current table by a column, toggling direction on repeat clicks.
//

function sortBy(column) {
	if (SORT_STATE.column === column) {
		SORT_STATE.dir *= -1;
	} else {
		SORT_STATE.column = column;
		SORT_STATE.dir = 1;
	}

	let sorted = CURRENT_DATA.slice().sort(function(a, b) {
		let av = "";
		let bv = "";
		if (column === INDEX_collection) {
			av = getCollection(a);
			bv = getCollection(b);
		} else if (column === INDEX_editor) {
			av = getEditor(a);
			bv = getEditor(b);
		} else if (column === INDEX_origin) {
			av = getOrigin(a);
			bv = getOrigin(b);
		} else if (column === INDEX_pages) {
			const am = (a[INDEX_pages] || "").match(/\d+/);
			const bm = (b[INDEX_pages] || "").match(/\d+/);
			return ((am ? parseInt(am[0]) : Infinity) - (bm ? parseInt(bm[0]) : Infinity)) * SORT_STATE.dir;
		} else {
			av = (a[column] || "").toString();
			bv = (b[column] || "").toString();
		}
		return av.localeCompare(bv) * SORT_STATE.dir;
	});

	let headings = [INDEX_id, INDEX_title, INDEX_composer, INDEX_pages, INDEX_origin, INDEX_collection, INDEX_editor];
	let tbody = document.querySelector("#list tbody");
	if (tbody) {
		tbody.innerHTML = makeTableBody(headings, sorted);
	}
	let thead = document.querySelector("#list thead");
	if (thead) {
		thead.innerHTML = makeTableHeader(headings);
	}
	saveSearchResultIds();
}



//////////////////////////////
//
// makeTableHeader -- Generate HTML content for browse table header.
//

const HEADING_LABELS = {
	[INDEX_id]:         "ID",
	[INDEX_collection]: "Collection",
	[INDEX_editor]:     "Editor",
	[INDEX_composer]:   "Composer",
	[INDEX_title]:      "Title",
	[INDEX_pages]:      "Pages",
	[INDEX_origin]:     "Origin",
};

const HEADING_I18N = {
	[INDEX_id]:         "rep.col_id",
	[INDEX_collection]: "rep.col_collection",
	[INDEX_editor]:     "rep.col_editor",
	[INDEX_composer]:   "rep.col_composer",
	[INDEX_title]:      "rep.col_title",
	[INDEX_pages]:      "rep.col_pages",
	[INDEX_origin]:     "rep.col_origin",
};

function makeTableHeader(headings) {
	let output = "";
	for (let i = 0; i < headings.length; i++) {
		let h = headings[i];
		let label = HEADING_I18N[h] ? t(HEADING_I18N[h]) : (HEADING_LABELS[h] || h);
		let arrow = "";
		if (SORT_STATE.column === h) {
			arrow = SORT_STATE.dir === 1 ? " ▲" : " ▼";
		}
		output += `<th class="sortable" onclick="sortBy('${h}')">${label}${arrow}</th>`;
	}
	output += "\n";
	return output;
}



//////////////////////////////
//
// makeTableBody -- Generate HTML content for browse table's body.
//

function makeTableBody(headings, data) {
	let output = "";
	for (let i = 0; i < data.length; i++) {
		let entry = data[i];
		let searchText = [
			entry[FIELD.composer], getTitle(entry), entry[FIELD.lyricist]
		].filter(Boolean).join(" ").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
		output += `<tr data-search="${searchText.replace(/"/g, "&quot;")}" data-id="${entry[FIELD.id]}">\n`;
		for (let j = 0; j < headings.length; j++) {
			let h = headings[j];
			let value = (typeof entry[h] !== "undefined") ? entry[h] : "";
			let tdClass = h.replace(/\s+/g, "-").replace(/[^a-zA-Z0-9_-]/g, "").toLowerCase();
			output += `<td class="${tdClass}">`;
			if (h === INDEX_title) {
				let scoreURL = getScoreURL(entry);
				output += `<a href=${scoreURL}>${getTitle(entry)}</a>`;
			} else if (h === INDEX_collection) {
				output += getCollection(entry);
			} else if (h === INDEX_editor) {
				output += getEditor(entry);
			} else if (h === INDEX_origin) {
				output += getOrigin(entry);
			} else {
				output += value;
			}
			output += "</td>\n";
		}
		output += "</tr>\n";
	}
	return output;
}



//////////////////////////////
//
// getTitle -- Generate Title + Subtitle
//

function getTitle(entry) {
	const title    = (entry[FIELD.title]     || "").trim();
	const subtitle = (entry[FIELD.title_sub] || "").trim();
	if (subtitle) return title ? `${title}, <i>${subtitle}</i>` : subtitle;
	return title;
}



//////////////////////////////
//
// getCollection -- Derive collection name (!!!OPR) from sources lookup.
//

function getCollection(entry) {
	let prefix = (entry[FIELD.id] || "").substring(0, 2);
	let source = SOURCES_LOOKUP[prefix];
	if (!source) return prefix;
	return source[SOURCE_FIELD.title] || prefix;
}



//////////////////////////////
//
// getEditor -- Derive editor name from sources lookup.
//

function getEditor(entry) {
	let prefix = (entry[FIELD.id] || "").substring(0, 2);
	let source = SOURCES_LOOKUP[prefix];
	if (!source) return "";
	let editor = source[SOURCE_FIELD.editor] || "";
	let m = editor.match(/^(.*?)\s*,\s*(.*?)$/);
	if (m) return m[2].trim() + " " + m[1].trim();
	return editor;
}



//////////////////////////////
//
// getScoreURL -- Generate URL
//

function getScoreURL(entry) {
	const id = entry[FIELD.id];
	if (!id) return "";
	let url = `/work/?id=${id}`;
	if (MELODIC_QUERY) url += `&melody=${encodeURIComponent(MELODIC_QUERY)}`;
	return `"${url}"`;
}


//////////////////////////////
//
// getSource -- Generate a source link based on "DIAMM Source Link" or "RISM Source Link".
//

function getSource(entry) {
	let diammurl = "";
	if (typeof entry["DIAMM Source Link"] !== "undefined") {
		diammurl = entry["DIAMM Source Link"];
	}
	if (!diammurl.match(/^https?:\/\/.*diamm\.ac\.uk\//)) {
		if (diammurl) {
			console.warn("DIAMM URL is invalid:", diammurl);
		}
		diammurl = "";
	}

	let rismurl = "";
	if (typeof entry["RISM Source Link"] !== "undefined") {
		rismurl = entry["RISM Source Link"];
	}
	if (!rismurl.match(/^https?:\/\/rism\.online\//)) {
		if (rismurl) {
			console.warn("RISM URL is invalid:", rismurl);
		}
		rismurl = "";
	}

	if (!diammurl && !rismurl) {
		console.error("Cannot find DIAMM or RISM source link in", entry);
		return "";
	}


	if (diammurl) {
		let text = "DIAMM";
		let matches = diammurl.match(/diamm\.ac\.uk\/sources\/(.*?)\//);
		if (matches) {
			text += ` ${matches[1]}`;
		}
		return diammurl;
	}

	if (rismurl) {
		let text = "RISM";
		let matches = rismurl.match(/opac\.rism\.info\/search\?.*id=(\d+)/);
		if (matches) {
			text += ` ${matches[1]}`;
		}
		return rismurl;
	}

	return "";
}



//////////////////////////////
//
// buildComposerSelect --
//

function buildComposerSelect(data) {
	let counter = {};
	let sum = data.length;
	for (let i=0; i<sum; i++) {
		let entry = data[i];
		let composer = entry[INDEX_composer];
		if (!composer) {
			console.error("WARNING: ", entry, " DOES NOT HAVE A COMPOSER");
			continue;
		}
		counter[composer] = (counter[composer] === undefined) ? 1 : counter[composer] + 1;
	}

	let clist = Object.keys(counter).sort();
	clist.sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
	let composerCount = clist.length;
	let output = "<select class='composer' onchange='doSearch()'>\n";
	output += `<option value="">${t('rep.composers_label')} (${composerCount})</option>`;
	for (let i=0; i<clist.length; i++) {
		let name = clist[i];
		let count = counter[clist[i]];
		output += `<option value="${name}">${name} (${count})</option>`;
	}
	output += "</select>\n";
	return output;
}

function handleMensurationSelect() {
  const select = document.getElementById("mensuration-select");
  const value = select.value;
  if (!value || selectedMensurations.has(value)) return;

  selectedMensurations.add(value);
  renderSelectedMensurations();
  select.value = ""; // reset dropdown
  doSearch();
}

function renderSelectedMensurations() {
  const container = document.getElementById("selected-mensurations");
  container.innerHTML = "";

  selectedMensurations.forEach(label => {
    const tag = document.createElement("div");
    tag.className = "selected-mensuration";
    tag.innerHTML = `
      <img src="/images/mensurations/${mensurationSigns[label]}" alt="${label}" title="${label}" style="height: 20px; vertical-align: middle;">
      <span class="remove-btn" title="Remove">×</span>
    `;

    tag.querySelector(".remove-btn").onclick = () => {
	  selectedMensurations.delete(label);

	  // Also un-highlight the icon in the dropdown
	  const dropdownItems = document.querySelectorAll(".mensuration-item");
	  dropdownItems.forEach(item => {
	    if (item.title === label) {
	      item.classList.remove("selected");
	    }
	  });

  renderSelectedMensurations();
  doSearch();
};

    container.appendChild(tag);
  });
}

function buildCustomMensurationMenu(container) {
  if (!container) return;
  container.innerHTML = "";

  Object.entries(mensurationSigns).forEach(([label, filename]) => {
    const item = document.createElement("div");
    item.className = "mensuration-item";
    item.title = label;

    const img = document.createElement("img");
    img.src = `/images/mensurations/${filename}`;
    img.alt = label;
    img.className = "mensuration-img";

    item.appendChild(img);

    item.onclick = () => {
		  if (selectedMensurations.has(label)) {
		    selectedMensurations.delete(label);
		    item.classList.remove("selected");
		  } else {
		    selectedMensurations.add(label);
		    item.classList.add("selected");
		  }

		  renderSelectedMensurations();
		  doSearch();

		  // Close the dropdown after selecting
		  const dropdown = container.closest(".custom-dropdown");
		  if (dropdown) {
		    dropdown.classList.remove("open");
		  }
		};

    container.appendChild(item);
  });
}

//
// buildTextSelect --
//

function buildTextSelect(data) {
	let counter = {};
	let fileCount = data.length;
	for (let i=0; i<fileCount; i++) {
		let entry = data[i];
		let text = getTextStatus(entry);
		if (!text) {
			// console.error("WARNING: ", entry, " DOES NOT HAVE AN ENTRY AS TO WHETHER IT IS TEXTED");
			continue;
		}
		counter[text] = (counter[text] === undefined) ? 1 : counter[text] + 1;
	}

	let tlist = Object.keys(counter).sort();
	let output = "<select class='text' onchange='doSearch()'>\n";
	output += `<option value="">Texted score?</option>`;
	// reverse order so "yes" is first, then "no":
	for (let i=tlist.length - 1; i>=0;  i--) {
		let state = tlist[i];
		let text = state;
		if (state === "yes") {
			text = "has text";
		} else if (state === "no") {
			text = "no text";
		}
		output += `<option value="${state}">${text} (${counter[state]})</option>`;
	}
	output += "</select>\n";
	return output;
}

//////////////////////////////
//
// doSearch --
//

function doSearch(data) {
	if (!Array.isArray(data)) {
		data = METADATA;
	}

	// Apply melodic filter if active
	if (MELODIC_MATCH_IDS !== null) {
		data = data.filter(entry => MELODIC_MATCH_IDS.has(entry[FIELD.id]));
	}

	let searchInterface = document.querySelector("#search-interface");
	if (!searchInterface) {
		console.log("Problem finding search interface");
		return;
	}

	let composerField = searchInterface.querySelector("select.composer");
	let composerQuery = composerField ? composerField.value : "";

	let originField = searchInterface.querySelector("select.origin");
	let originQuery = originField ? originField.value : "";

	let collectionField = searchInterface.querySelector("select.collection");
	let collectionQuery = collectionField ? collectionField.value : "";

	let lyricistField = searchInterface.querySelector("select.lyricist");
	let lyricistQuery = lyricistField ? lyricistField.value : "";

	let editorField = searchInterface.querySelector("select.editor");
	let editorQuery = editorField ? editorField.value : "";

	let variantsCheckbox = document.querySelector("#variants-checkbox");

	if (composerQuery) {
		data = data.filter(entry => entry[INDEX_composer] === composerQuery);
	}

	if (originQuery) {
		data = data.filter(entry => getOrigin(entry) === originQuery);
	}

	if (collectionQuery) {
		data = data.filter(entry => getCollection(entry) === collectionQuery);
	}

	if (lyricistQuery) {
		data = data.filter(entry => (entry[FIELD.lyricist] || "").trim() === lyricistQuery);
	}

	if (editorQuery) {
		data = data.filter(entry => getEditor(entry) === editorQuery);
	}

	if (!variantsCheckbox || !variantsCheckbox.checked) {
		data = data.filter(entry => !/[c-z]$/i.test(entry[FIELD.id] || ""));
	}

	displayBrowseTable(data);
	FreeTextSearch();
	updateBrowseUrlDisplay();
}



//////////////////////////////
//
// saveSearchResultIds -- Persist the ordered list of currently-visible work IDs
//    to sessionStorage so the work detail page can offer prev/next navigation.
//

function saveSearchResultIds() {
  const rows = document.querySelectorAll("#list tbody tr");
  const ids = [];
  for (let i = 0; i < rows.length; i++) {
    if (rows[i].style.display !== "none" && rows[i].dataset.id) {
      ids.push(rows[i].dataset.id);
    }
  }
  sessionStorage.setItem("1520_search_ids", JSON.stringify(ids));
  sessionStorage.setItem("1520_search_url", window.location.href);
}


//////////////////////////////
//
// FreeTextSearch --  Search for any text within the browse table and hide
//    rows that do not have the searched text.
//

function FreeTextSearch(query) {
  const tr = document.querySelectorAll("#list tbody tr");
  const input = document.querySelector("#input");

  if (query !== undefined) {
    input.value = query;
  } else {
    query = input.value;
  }

  if (!query) {
    displaySearchCount(tr.length);
    showAllBrowseRows();
    updateBrowseUrlDisplay();
    saveSearchResultIds();
    return;
  }

  // --- normalization helpers
  const normalize = str =>
    str
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "");

  const tokens = normalize(query)
    .split(/\s+/)
    .filter(Boolean);

  let searchCount = 0;

  for (let i = 0; i < tr.length; i++) {
    const haystack = normalize(tr[i].dataset.search || "");
    const matched = tokens.every(token => haystack.includes(token));
    tr[i].style.display = matched ? "" : "none";
    if (matched) searchCount++;
  }

  displaySearchCount(searchCount);
  updateBrowseUrlDisplay();
  saveSearchResultIds();
}



//////////////////////////////
//
// showAllBrowseRows -- Used to display all rows (again) in browse table when
//    the free-text search is not being used.
//

function showAllBrowseRows() {
	let tr = document.querySelectorAll("#list tbody tr");
	for (let i=0; i<tr.length; i++) {
		tr[i].style.display = "";
	}
}

function displaySearchCount(count) {
	let output = "";
	if (count == 1) {
		output = `[${count} ${t('rep.result')}]`;
	} else {
		output = `[${count} ${t('rep.results')}]`;
	}
	let searchCountElement = document.querySelector("#search-count");
	if (searchCountElement) {
		searchCountElement.innerHTML = output;
	}
}


//////////////////////////////
//
// setComposerSelectMenu -- Used to set the composer from the "c" CGI input parameter.
// First search for exact match, then for composer ID, then partial matches for multiple
// or single words (or pieces of words) in the composer's name.  Does not deal with
// adding or removing accents from characters when comparing text.  If length of input
// is 3 it is assumed to be a composer ID.
//
// Here are examples:
//
// Exact match to name in option list:
//      http://www.1520s-project.org/browse/?c=Willaert,%20Adrian
// Alias of "composer" for "c":
//      http://www.1520s-project.org/browse/?composer=Willaert,%20Adrian
// Reversing name to "first last":
//      http://www.1520s-project.org/browse/?c=Adrian%20Willaert
// Using composer ID (case insensitive)
//      http://www.1520s-project.org/browse/?c=Wil
// Using partial name (will select the first composer that matches:
//      http://www.1520s-project.org/browse/?c=Adrian
//

function setComposerSelectMenu(input) {
	if (!input) {
		return;
	}

	// Convert composer ID to exact name ("last, first"):
	if (input.length === 3) {
		for (let i=0; i<COMPOSERS.length; i++) {
			if (COMPOSERS[i].ID.toLowerCase() === input.toLowerCase()) {
				input = COMPOSERS[i].Composer;
				break;
			}
		}
	}

	let composerSelect = document.querySelector("select.composer");
	if (!composerSelect) {
		return;
	}

	let options = composerSelect.querySelectorAll("option");

	// Search for exact composer name match:
	for (let i=0; i<options.length; i++) {
		let value = options[i].value;
		if (value === input) {
			options[i].selected = true;
			return;
		}
	}

	input = input.replace(/^\s+/, "").replace(/\s+$/, "").replace(/\s+/, " ", "g");
	if (input.match(/\s/)) {
		// Search for multiple pieces of composer name (all pieces must match):
		let pieces = input.split(/\s/);
		for (let i=0; i<options.length; i++) {
			let value = options[i].value;
			let allMatch = true;
			let regexes = [];
			for (let j=0; j<pieces.length; j++) {
				regexes[j] = new RegExp(pieces[j], "i");
			}
			for (let j=0; j<pieces.length; j++) {
				if (!value.match(regexes[j])) {
					allMatch = false;
					break;
				}
			}
			if (allMatch) {
				options[i].selected = true;
				return;
			}
		}
	} else {
		// Search for single piece of composer name (all pieces must match,
		// and only the first match will be used):
		let regex = new RegExp(input, "i");
		for (let i=0; i<options.length; i++) {
			let value = options[i].value;
			if (value.match(regex)) {
				options[i].selected = true;
				return;
			}
		}
	}

}

//
// updateBrowseUrlDisplay --
//
// Order of CGI parameters: qcvxygs
//

function updateBrowseUrlDisplay() {
	let url      = `${window.location.origin}${window.location.pathname}`;
	let freetext = document.querySelector("input#input").value.trim();
	let composerEl    = document.querySelector("select.composer");
	let originEl      = document.querySelector("select.origin");
	let collectionEl  = document.querySelector("select.collection");
	let editorEl      = document.querySelector("select.editor");
	let variantsChecked = document.querySelector("#variants-checkbox") && document.querySelector("#variants-checkbox").checked;

	let composer   = composerEl   ? composerEl.value.trim()   : "";
	let origin     = originEl     ? originEl.value.trim()     : "";
	let collection = collectionEl ? collectionEl.value.trim() : "";
	let editor     = editorEl     ? editorEl.value.trim()     : "";

	let cgi = "";

	if (freetext) {
		cgi += "q=" + encodeURIComponent(freetext);
	}
	if (composer) {
		if (cgi) cgi += "&";
		cgi += "c=" + encodeURIComponent(composer);
	}
	if (origin) {
		if (cgi) cgi += "&";
		cgi += "o=" + encodeURIComponent(origin);
	}
	if (collection) {
		if (cgi) cgi += "&";
		cgi += "col=" + encodeURIComponent(collection);
	}
	if (editor) {
		if (cgi) cgi += "&";
		cgi += "ed=" + encodeURIComponent(editor);
	}
	if (variantsChecked) {
		if (cgi) cgi += "&";
		cgi += "v=yes";
	}

	if (cgi) {
		url += "?" + cgi;
	}

	if (url !== window.location.href) {
		window.history.pushState(null, null, url);
	}
}

//////////////////////////////
//
// Melodic search — filters table to works whose melody contains
// the queried pitch sequence (exact pitch classes, ignoring octave).
//
// Index format: { "BC001": "G A Bb D G ...", ... }
// Query format: space-separated note names, e.g. "G A G F# Eb"
//

let MELODIC_MATCH_IDS  = null;   // null = inactive; Set<id> = active filter
let MELODIC_QUERY      = null;   // normalized query string, e.g. "G A F# E"
let _melodicIndexCache = null;   // lazy-loaded from /assets/melodic-index.json
let _melodicTimer      = null;

async function _loadMelodicIndex() {
	if (_melodicIndexCache !== null) return _melodicIndexCache;
	try {
		const resp = await fetch('/assets/melodic-index.json');
		if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
		_melodicIndexCache = await resp.json();
	} catch (e) {
		console.warn('Melodic index unavailable — run "make melodic-index" to build it.', e);
		_melodicIndexCache = {};
	}
	return _melodicIndexCache;
}

function _normalizeMelodicQuery(raw) {
	// Accepts two input formats (all tokens must be the same type):
	//   Pitch names:   "G A G F# Eb"   → normalized to "G A G F# Eb"
	//   Scale degrees: "1 2 3 b7 5"    → returned as-is after validation
	// Returns the normalized string, or null if the query is invalid/incomplete.
	const tokens = raw.trim().split(/\s+/);
	if (tokens.length < 2) return null;

	// Scale degree query: every token is [#b]?[1-7]
	if (tokens.every(t => /^[#b]?[1-7]$/.test(t))) {
		return tokens.join(' ');
	}

	// Pitch name query
	const out = [];
	for (const tok of tokens) {
		const m = tok.match(/^([A-Ga-g])([#b]?)$/i);
		if (!m) return null;
		out.push(m[1].toUpperCase() + (m[2] === 'b' ? 'b' : m[2] === '#' ? '#' : ''));
	}
	return out.join(' ');
}

function handleMelodicInput() {
	clearTimeout(_melodicTimer);
	_melodicTimer = setTimeout(_runMelodicSearch, 350);
}

async function _runMelodicSearch() {
	const input = document.getElementById('melodic-input');
	const raw   = input ? input.value.trim() : '';

	if (!raw) {
		if (MELODIC_MATCH_IDS !== null) {
			MELODIC_MATCH_IDS = null;
			MELODIC_QUERY     = null;
			doSearch();
		}
		return;
	}

	const normalized = _normalizeMelodicQuery(raw);
	if (!normalized) return;   // query incomplete — wait for more input

	// Detect query type by checking the first token.
	// Degree tokens are [#b]?[1-7]; pitch tokens start with a letter.
	const isDegreeQuery = /^[#b]?[1-7]$/.test(normalized.split(' ')[0]);

	const index  = await _loadMelodicIndex();
	const needle = normalized;
	const ids    = new Set();

	for (const [id, entry] of Object.entries(index)) {
		// Support both new format ({p, d, key}) and legacy format (plain string).
		const sequence = isDegreeQuery
			? (typeof entry === 'object' ? entry.d : null)
			: (typeof entry === 'object' ? entry.p : entry);
		if (!sequence) continue;
		if ((' ' + sequence + ' ').includes(' ' + needle + ' ')) ids.add(id);
	}

	MELODIC_MATCH_IDS = ids;
	MELODIC_QUERY = normalized;
	doSearch();
}
