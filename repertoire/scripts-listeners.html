<script>

let METADATA              = {% include metadata/works.json %};
let SOURCES_METADATA      = {% include metadata/sources.json %};
let SOURCES_LOOKUP        = {};
for (let _si = 0; _si < SOURCES_METADATA.length; _si++) {
    let _s = SOURCES_METADATA[_si];
    if (_s[SOURCE_FIELD.id]) SOURCES_LOOKUP[_s[SOURCE_FIELD.id].substring(0, 2)] = _s;
}

// Column identifiers for the browse table.
// Ones that match real field names use FIELD.* from _config.yml.
// Synthetic ones ("title", "origin", etc.) are just branch keys in makeTableBody.
let INDEX_id              = FIELD.id;
let INDEX_composer        = FIELD.composer;
let INDEX_title           = "title";
let INDEX_pages           = FIELD.pages;
let INDEX_origin          = "origin";
let INDEX_text            = "text";
let INDEX_collection      = "collection";
let INDEX_editor          = "editor";

function getTextStatus(entry) {
	return entry["!!!EST-text"] || "";
}

function getOrigin(entry) {
	return entry[FIELD.origin] || "";
}

//////////////////////////////
//
// DOMContentLoaded event handler -- Runs after webpage finishes loading.
//     Builds the select menus from the METADATA object and displays the
//     browse table.
//

document.addEventListener("DOMContentLoaded", function () {
	buildSearchInterface(METADATA, "#search-interface");

	let cgi = getCgiParameters();
	let runSearch = true;

	// Set the composer select menu:
	if (cgi.c) {
		setComposerSelectMenu(cgi.c);
		runSearch = true;
	} else if (cgi.composer) {
		setComposerSelectMenu(cgi.composer);
		runSearch = true;
	}

	// Set the origin select menu:
	if (cgi.o) {
		setOriginSelectMenu(cgi.o);
		runSearch = true;
	} else if (cgi.origin) {
		setOriginSelectMenu(cgi.origin);
		runSearch = true;
	}

	// Set the collection select menu:
	if (cgi.col) {
		setCollectionSelectMenu(cgi.col);
		runSearch = true;
	} else if (cgi.collection) {
		setCollectionSelectMenu(cgi.collection);
		runSearch = true;
	}

	// Show all variants if requested:
	if (cgi.v === "yes") {
		let variantsEl = document.querySelector("#variants-checkbox");
		if (variantsEl) variantsEl.checked = true;
		runSearch = true;
	}

	// Run a search based on the select menu settings:
	if (runSearch) {
		doSearch();
	}

	// Check for a free-text search to run on the search-results table:
	if (cgi.q) {
		FreeTextSearch(cgi.q);
	} else if (cgi.query) {
		FreeTextSearch(cgi.query);
	} else if (cgi.search) {
		FreeTextSearch(cgi.search);
	}

	// Move the cursor to the search box when the page is loaded:
	let searchElement = document.querySelector("#input");
	if (searchElement) {
		searchElement.focus();
	}

});



//////////////////////////////
//
// keydown event listener == clear select menus if delete/backspace
//    pressed (or press backspace/delete when freetext search is empty
//    when in #input).
//

document.addEventListener('keydown', function(event) {
	if ((event.key !== "Delete") && (event.key !== "Backspace")) {
		// Only checking delete/backspace keys for now.
		return;
	}
	let activeElement = document.activeElement;
	if (activeElement.id === "input") {
		let value = activeElement.value;
		if (value) {
			// Do nothing unless contents of #input is empty.
			return;
		}
		clearSearchFields();
	} else {
		clearSearchFields();
	}
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    const menu = document.getElementById("mensuration-menu");
    if (menu) {
      const dropdown = menu.closest(".custom-dropdown");
      if (dropdown) {
        dropdown.classList.remove("open");
      }
    }
  }
});

document.addEventListener("click", function(event) {
  const openDropdowns = document.querySelectorAll(".custom-dropdown.open");
  openDropdowns.forEach(dropdown => {
    if (!dropdown.contains(event.target)) {
      dropdown.classList.remove("open");
    }
  });
});

</script>
