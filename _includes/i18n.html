<style>
  /* Hide language blocks before JS runs to prevent flash */
  [data-lang] { display: none; }
</style>

<script>
(function () {

  // ── Minimal ATON parser ───────────────────────────────────────────────────
  // Handles: @@START:name, @@END:name, @key: value, @ comment lines.
  // Multiline values: lines after @key without a leading @ are appended.

  function parseAton(text) {
    var result = {};
    var section = null;
    var key = null;
    var val = [];

    function flush() {
      if (section && key) {
        result[section][key] = val.join('\n').replace(/\s+$/, '');
      }
      key = null;
      val = [];
    }

    var lines = text.split('\n');
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];

      var startM = line.match(/^@@START:(\S+)/);
      if (startM) { flush(); section = startM[1]; result[section] = {}; continue; }

      if (/^@@END:/.test(line)) { flush(); section = null; continue; }

      // Skip comment lines and non-@ lines outside a section
      if (!section) continue;
      if (/^@ /.test(line) || line === '@') continue;

      var kvM = line.match(/^@([^:]+):\s*(.*)/);
      if (kvM) { flush(); key = kvM[1]; val = [kvM[2]]; continue; }

      // Continuation line (multiline value)
      if (key) val.push(line);
    }
    flush();
    return result;
  }

  var T = parseAton(`{% include translations.aton %}`);

  // ── Language setup ────────────────────────────────────────────────────────

  window.LANG = localStorage.getItem('chanson_lang') || 'en';
  document.documentElement.lang = window.LANG;

  window.t = function (key) {
    return (T[window.LANG] || {})[key] || (T['en'] || {})[key] || key;
  };

  window.setLang = function (lang) {
    localStorage.setItem('chanson_lang', lang);
    window.location.reload();
  };

  // ── Apply translations to DOM ─────────────────────────────────────────────

  window.applyTranslations = function () {
    // Text content
    document.querySelectorAll('[data-i18n]').forEach(function (el) {
      var v = t(el.getAttribute('data-i18n'));
      if (v) el.textContent = v;
    });
    // Placeholder attributes
    document.querySelectorAll('[data-i18n-placeholder]').forEach(function (el) {
      var v = t(el.getAttribute('data-i18n-placeholder'));
      if (v) el.placeholder = v;
    });
    // innerHTML (for values containing HTML links etc.)
    document.querySelectorAll('[data-i18n-html]').forEach(function (el) {
      var v = t(el.getAttribute('data-i18n-html'));
      if (v) el.innerHTML = v;
    });
    // Language blocks — show only the block matching the current language
    document.querySelectorAll('[data-lang]').forEach(function (el) {
      el.style.display = el.getAttribute('data-lang') === window.LANG ? '' : 'none';
    });
    // Toggle button label
    var btn = document.getElementById('lang-toggle');
    if (btn) btn.textContent = window.LANG === 'en' ? 'FR' : 'EN';
  };

  document.addEventListener('DOMContentLoaded', window.applyTranslations);

})();
</script>
