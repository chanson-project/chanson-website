

<script>
// vim: ts=3:nowrap


//////////////////////////////
//
// displayWork -- Given the input work ID, display the work.
//

function displayWork(id) {
	if (!id) {
		id = DATA1520.workid;
	}
	if (!id) {
		id = "BC001";
	}
	DATA1520.workid = id;

	if (typeof id !== "string") {
		console.error("ERROR: Work ID is not a string:", string);
		return;
	}

	// See https://plugin.humdrum.org/options/#list for more display options.
	// Copying default options from DATA1520.hnp_options:
	let hnpOptions = JSON.parse(JSON.stringify(DATA1520.hnp_options));

	hnpOptions.postFunction = function() {
		// callback function to run after SVG score has been displayed.
		removeWait();
		prepareQEvents(id);
	};

	// Set display options:
	hnpOptions.filter = [];
	if (DATA1520.filter) {
		hnpOptions.filter.push(DATA1520.filter);
	}
	if (window.localStorage.AccidentalState === "hide") {
		hnpOptions.filter.push("shed -ke s/X?i/y/g");
	}
	if (window.localStorage.TextState === "show") {
		hnpOptions.filter.push("text -a");
	}

	let prefix = id.substring(0, 2);
	if (prefix === "BC" || prefix === "EG") {
		let dir = prefix === "BC" ? "bc100" : "eg104";
		let work = DATA1520.lookup.works[id];
		let filename = work["File Name"] || work["Filename"] || "";
		fetch("https://raw.githubusercontent.com/chanson-project/chanson-encoding/refs/heads/main/" + dir + "/kern/" + filename)
			.then(function(response) { return response.text(); })
			.then(function(kern) {
				document.getElementById("my-score").textContent = kern;
				displayHumdrum(hnpOptions);
				KernPlayer.load(kern);
			});
	} else {
		displayHumdrum(hnpOptions);
	}

	displayWorkInfo(id);
	displayExternalInfo(id);
	displayWorkFooter(id);
}



//////////////////////////////
//
// createLookup -- Convert an array of objects into a lookup table, where the
//    "ID" property of the objects is used as the key value for the lookup table.
//    For example if the ID of an entry is "Jac2001" in the input array, then
//    output.Jac2001 (or output["Jac2001"]) will return the entry for work ID "Jac2001".
//

function createLookup(dataArray) {
	if (!Array.isArray(dataArray)) {
		console.error("ERROR: input is not an array:", dataArray);
		return;
	}
	let output = {};
	for (entry of dataArray) {
		let id = entry.ID
		output[id] = entry;
	}
	return output;
}



//////////////////////////////
//
// displayWorkInfo -- Show information table at top of page.
//

function displayWorkInfo(id) {
	let element = document.querySelector("#work-info");
	if (!element) {
		console.error("ERROR: no #work-info element");
		return;
	}

	if (!id) id = DATA1520.workid;
	if (!id) id = "BC001";
	DATA1520.workid = id;

	let workinfo = DATA1520.lookup.works[id];
	if (!workinfo) {
		console.error(`Error: Cannot find workinfo for ${id} in displayWorkInfo()`);
		return;
	}

	let tbody = document.querySelector("tbody#work-info-body");
	if (!tbody) {
		console.warn("Cannot find tbody#work-info-body");
		return;
	}
	if (!tbody.innerHTML.match(/^\s*$/)) return;

	// Derive collection label and GitHub paths from ID prefix
	const prefix = id.substring(0, 2);
	const dir    = prefix === "BC" ? "bc100" : prefix === "EG" ? "eg104" : "";
	const fname  = workinfo["File Name"] || workinfo["Filename"] || "";
	const rawBase    = "https://raw.githubusercontent.com/chanson-project/chanson-encoding/refs/heads/main";
	const githubBase = "https://github.com/chanson-project/chanson-encoding/blob/main";
	const rawURL    = dir && fname ? `${rawBase}/${dir}/kern/${fname}` : "";
	const githubURL = dir && fname ? `${githubBase}/${dir}/kern/${fname}` : "";

	const sourceEntry   = DATA1520.lookup.sources[prefix] || {};
	const collectionName = sourceEntry["!!!OPR"] || prefix;
	const collectionLink = `/sources/?s=${encodeURIComponent(prefix)}`;

	// ── Left column: bibliographic ─────────────────────────────────────────────

	let titleoutput = "";
	const titleText = workinfo.Title || workinfo["!!!OTL@@FR"] || "";
	if (titleText) {
		titleoutput = `<div class="work-item"><b>${t('work.title')}:</b> ${titleText}</div>`;
	}

	let composeroutput = "";
	const com = workinfo["!!!COM"] || "";
	if (com) {
		let display = com;
		const m = com.match(/^(.*?)\s*,\s*(.*?)$/);
		if (m) display = `${m[2]} ${m[1]}`;
		composeroutput = `<div class="work-item"><b>${t('work.composer')}:</b> ${display}</div>`;
	}

	let lyricistoutput = "";
	const lyr = workinfo["!!!LYR"] || "";
	if (lyr) {
		let display = lyr;
		const m = lyr.match(/^(.*?)\s*,\s*(.*?)$/);
		if (m) display = `${m[2]} ${m[1]}`;
		lyricistoutput = `<div class="work-item"><b>${t('work.lyricist')}:</b> ${display}</div>`;
	}

	const collectionoutput = `<div class="work-item"><b>${t('work.collection')}:</b> <a href="${collectionLink}">${collectionName}</a></div>`;
	const pagesoutput = workinfo.Pages ? `<div class="work-item"><b>${t('work.pages')}:</b> ${workinfo.Pages}</div>` : "";

	// ── Middle column: origin and encoding status ──────────────────────────────

	const originoutput = workinfo.Origin
		? `<div class="work-item"><b>${t('work.origin')}:</b> ${workinfo.Origin}</div>`
		: "";

	const notesoutput = workinfo.Notes
		? `<div class="work-item"><b>${t('work.notes')}:</b> ${workinfo.Notes}</div>`
		: "";

// ── Right column: encoders and links ───────────────────────────────────────

	let encodersoutput = "";
	const encoderList = [];
	for (let n = 1; n <= 5; n++) {
		const name = workinfo[`EED-${n}`];
		const date = workinfo[`EEV-${n}`];
		if (name) encoderList.push(date ? `${name} (${date})` : name);
	}
	if (encoderList.length) {
		const label = encoderList.length > 1 ? t('work.encoders') : t('work.encoder');
		encodersoutput = `<div class="work-item"><b>${label}:</b> ${encoderList.join(", ")}</div>`;
	}

	let linksoutput = "";
	if (rawURL) {
		const vhvURL = `https://verovio.humdrum.org/?k=e&file=${encodeURIComponent(rawURL)}`;
		linksoutput = `<div class="work-item"><b>${t('work.view_on')}:</b> <a target="_blank" href="${vhvURL}">VHV</a> | <a target="_blank" href="${githubURL}">GitHub</a></div>`;
	}

	const downloadoutput = rawURL
		? `<div class="work-item"><b>${t('work.download')}:</b> <a href="${rawURL}" download>${t('work.humdrum_file')}</a></div>`
		: "";

	// ── Build table row ────────────────────────────────────────────────────────

	const row = document.createElement("tr");

	const leftCell = document.createElement("td");
	leftCell.innerHTML = titleoutput + composeroutput + lyricistoutput + collectionoutput + pagesoutput;
	row.appendChild(leftCell);

	const middleCell = document.createElement("td");
	middleCell.innerHTML = originoutput + notesoutput;
	row.appendChild(middleCell);

	const rightCell = document.createElement("td");
	rightCell.innerHTML = encodersoutput + linksoutput + downloadoutput;
	row.appendChild(rightCell);

	tbody.appendChild(row);
}

//////////////////////////////
//
// forceDownload -- Force download of data files (instead of opening in a new browser window).
//

function forceDownload(event) {
	event.stopPropagation();   // Do not open the hyperlink.
	event.preventDefault();    // Prevent default behavior for <a>
	let target = event.target;
	let url = target.getAttribute("href");
	let filename = url.replace(/.*\//, "");
	downloadFile(url, filename);
}



//////////////////////////////
//
// downloadFile -- Save file contents to local computer.
//

function downloadFile(url, filename) {
	fetch(url)
	.then(response => response.blob())
	.then(blob => {
		const a = document.createElement('a');
		const objectURL = URL.createObjectURL(blob);
		a.href = objectURL;
		a.download = filename;
		a.click();
		URL.revokeObjectURL(objectURL);
	})
	.catch(error => {
		console.error('Error:', error);
	});
}

//

		id = DATA1520.workid;

	let element = document.querySelector("#work-footer");

	// let workinfo = DATA1520.lookup.works[id];

//////////////////////////////
//
// displayExternalInfo --
//

function displayExternalInfo(id) {
	let element = document.querySelector("#external-info");
	if (!element) {
		console.error("ERROR: no #external-info element");
		return;
	}
	if (!id) {
		id = DATA1520.workid;
	}
	let workinfo = DATA1520.lookup.works[id];
	if (!workinfo) {
		console.error(`Error: Cannot find workinfo for ID=${id}`);
	}

	let output = "";
	let title              = workinfo["Title"] || workinfo["!!!OTL@@FR"] || "";
	let externalURL        = workinfo["External Project URL"];
	let externalName       = workinfo["External Project Name"];
	let criticalCommentary = workinfo["Critical Commentary"];

	if (externalURL && externalName) {
			if (criticalCommentary == "yes") {
					output += `<center>For more information on <i>${title}</i> and the critical commentary, see <a target="_blank" href="${externalURL}">${externalName}</a>.</center><br><br>`;
			} else {
				output += `<center>For more information on <i>${title}</i>, see <a target="_blank" href="${externalURL}">${externalName}</a>.</center><br><br>`;
			}
	}
	element.innerHTML = output;
}

//////////////////////////////
//
// initializeAccidentalStateButton --
//

function initializeAccidentalStateButton() {
	let state = window.localStorage.AccidentalState;
	if (!state) {
		state = "show";
		window.localStorage.AccidentalState = "show";
	}
	let element = document.querySelector("#accidentalSelect");
	if (!element) {
		return;
	}
	let showElement = element.querySelector(".show");
	if (!showElement) {
		console.error("Cannot find accidental show button");
		return;
	}
	let hideElement = element.querySelector(".hide");
	if (!showElement) {
		console.error("Cannot find accidental hide button");
		return;
	}
	if (state === "show") {
		showElement.classList.add("hidden");
		hideElement.classList.remove("hidden");
	} else {
		showElement.classList.remove("hidden");
		hideElement.classList.add("hidden");
	}
}



//////////////////////////////
//
// downloadAndDisplayInlinePng --
//

async function downloadAndDisplayInlinePng(url, container) {
	try {
		let titleurl    = url //.replace(/-notitle/, "");
		const response  = await fetch(url);
		const blob      = await response.blob();
		const reader    = new FileReader();
		reader.onloadend = function () {
			container.innerHTML = `<a target="_blank" href="${titleurl}"><img style="cursor:pointer"></a>`;
			let imgDiv = container.querySelector("img");
			imgDiv.src = reader.result;
		};
		reader.readAsDataURL(blob);
	} catch (error) {
		console.error("Error fetching or displaying the image:", error);
	}
}



//////////////////////////////
//
// downloadAndDisplayInlineSvg --
//

async function downloadAndDisplayInlineSvg(url, container) {
	try {
		const response = await fetch(url);
		const text     = await response.text();
		container.innerHTML = `<a style="cursor:pointer" target="_blank" href="${url}">${text}</a>`;
	} catch (error) {
		console.error("Error fetching or displaying the image:", error);
	}
}



//////////////////////////////
//
// downloadData --
//

function downloadData(container, id, ext, ID) {
	let url = `${DATA1520.dataurl}/${DATA1520.workid}-${id}.${ext}`;
	if (ext === "png") {
		downloadAndDisplayInlinePng(url, container);
	} else if (ext === "svg") {
		downloadAndDisplayInlineSvg(url, container);
	}
}



//////////////////////////////
//
// removeWait -- Callback function for stopping the spinning
//    cursor (after notation is displayed).
//

function removeWait() {
	document.body.classList.remove("wait");
}



//////////////////////////////
//
// printSeekableAudioInfo --
//

function printSeekableAudioInfo() {
	let seekable = DATA1520.audio.seekable;
	for (let i=0; i<seekable.length; i++) {
		let start = seekable.start(i);
		let end   = seekable.end(i);
		console.log(`Audio seekable range ${i}: ${start}-${end}`);
	}
}



//////////////////////////////
//
// playAudioCallback --
//

function playAudioCallback() {
	console.warn("STARTING PLABACK, CURRENT TIME", DATA1520.audio.currentTime);
	let audioButtonPlay  = document.querySelector("#audiobutton-play");
	let audioButtonPause = document.querySelector("#audiobutton-pause");
	if (audioButtonPlay) {
		console.warn("HIDING PLAY BUTTON");
		audioButtonPlay.classList.add("hidden");
	} else {
		console.error("Cannot find #audiobutton-play");
	}
	if (audioButtonPause) {
		audioButtonPause.classList.remove("hidden");
	} else {
		console.error("Cannot find #audiobutton-pause");
	}
	DATA1520.audio.setAttribute('controls', 'controls');
	initializeTimemap();
}



//////////////////////////////
//
// pauseAudioCallback --
//

function pauseAudioCallback() {
	console.log("PAUSING audio");
	let audioButtonPlay  = document.querySelector("#audiobutton-play");
	let audioButtonPause = document.querySelector("#audiobutton-pause");
	if (audioButtonPlay) {
		audioButtonPlay.classList.remove("hidden");
	} else {
		console.error("Cannot find #audiobutton-play");
	}
	if (audioButtonPause) {
		audioButtonPause.classList.add("hidden");
	} else {
		console.error("Cannot find #audiobutton-pause");
	}
	unhighlightAllNotesInSvg();
	if (REFRESH) {
		clearInterval(REFRESH);
	}
}



//////////////////////////////
//
// TogglePlayPauseOfAudio --
//

function togglePlayPauseOfAudio() {
    let audio = DATA1520.audio;
    if (audio.paused) {
        audio.play();
    } else {
        audio.pause();
    }
}

</script>
